name: "Release API Finance Project"
on:
  push:
    branches:
      - main
permissions: {}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: "Getting source code"
        uses: actions/checkout@v5

      - name: "Installing Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"

      - name: "Setting up PNPM"
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.12.0

      - name: "Installing project dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Setting up Prisma"
        run: pnpm exec prisma generate

      - name: "Creating dist"
        run: pnpm run build

      - name: "Extracting version from package.json"
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: "Uploading dist for the next job"
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

  package:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:
      - name: "Getting source code"
        uses: actions/checkout@v5

      - name: "Downloading dist"
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: "Login into DockerHub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Setting up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Building and pushing Docker Image"
        run: |
          docker buildx build \
          --push --platform linux/amd64,linux/arm64 \
          --cache-from=type=gha --cache-to=type=gha,mode=max \
          -t ${{ secrets.DOCKER_USERNAME }}/api-finance.devsonic.cl:${{ needs.build.outputs.version }} .

  deployment:
    runs-on: ubuntu-latest
    needs: [build, package]
    permissions: {}
    steps:

      - name: "Conecting to DevSonic Network"
        uses: Twingate/github-action@v1.8
        with:
          service-key: ${{ secrets.DEVSONIC_NETWORK_KEY }}

      - name: "Deploy to Kubernetes"
        uses: steebchen/kubectl@v2.1.1
        with:
          config: ${{ secrets.KUBE_CONFIG_DATA }}
          command: set image deployment/api-finance-devsonic-cl api-finance-devsonic-cl=${{ secrets.DOCKER_USERNAME }}/api-finance.devsonic.cl:${{ needs.build.outputs.version }} -n devsonic-cl

      - name: "Veryfing Deployment"
        uses: steebchen/kubectl@v2.1.1
        with:
          config: ${{ secrets.KUBE_CONFIG_DATA }}
          command: rollout status deployment/api-finance-devsonic-cl -n devsonic-cl
